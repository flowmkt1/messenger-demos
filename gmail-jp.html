<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  body{font-family:"Noto Sans JP","Roboto","Segoe UI",sans-serif;background:#202730;min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px 16px 40px 320px;}

  /* ===== 패널 ===== */
  .controls{width:280px;flex-shrink:0;position:fixed;left:20px;top:24px;
    background:#2b333d;border:1px solid #3b4654;border-radius:14px;padding:14px 16px;color:#cdd6e0;z-index:50;}
  .controls h2{font-size:13px;font-weight:600;color:#8ea3b8;margin:12px 0 8px;letter-spacing:.02em;}
  .lbl{font-size:12px;color:#8ea3b8;margin-bottom:6px;}
  .seg{display:flex;gap:6px;margin-bottom:6px;}
  .seg .btn{flex:1;text-align:center;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:6px;}
  .chip{border:1px solid #45525f;background:#333d49;color:#c7d2dd;font-size:12.5px;padding:6px 11px;border-radius:999px;cursor:pointer;transition:.15s;white-space:nowrap;}
  .chip:hover{background:#3d4956;}
  .chip.active{background:#c5221f;border-color:#c5221f;color:#fff;font-weight:600;}
  .row2{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px;}
  .btn{border:none;background:#3f4b58;color:#dfe7ef;font-size:12.5px;padding:7px 12px;border-radius:8px;cursor:pointer;transition:.15s;}
  .btn:hover{background:#4a5867;}
  .btn.active{background:#c5221f;color:#fff;font-weight:600;}
  .toggle{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#aebccb;cursor:pointer;user-select:none;}
  .toggle input{width:15px;height:15px;accent-color:#c5221f;cursor:pointer;}

  .stage{display:flex;align-items:center;justify-content:center;}

  /* ========== PC (Gmail web) ========== */
  .gwin{width:1020px;height:648px;background:#f6f8fc;border-radius:10px;overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.5);display:flex;flex-direction:column;position:relative;}
  .gwin.flat{border-radius:0;box-shadow:none;}
  .gm-top{height:60px;background:#f6f8fc;display:flex;align-items:center;gap:14px;padding:0 16px;}
  .gm-top .burger{font-size:20px;color:#5f6368;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
  .gm-top .logo{display:flex;align-items:center;gap:7px;}
  .gm-top .logo span{font-size:21px;color:#5f6368;font-weight:400;letter-spacing:.5px;}
  .gm-search{flex:0 1 660px;height:46px;background:#eaf1fb;border-radius:24px;display:flex;align-items:center;gap:12px;padding:0 18px;color:#5f6368;font-size:15px;transition:.15s;}
  .gm-search:focus-within{background:#fff;box-shadow:0 1px 6px rgba(32,33,36,.28);}
  .gm-search input{border:none;background:none;outline:none;flex:1;font:inherit;color:#202124;}
  .gm-top .tr{display:flex;align-items:center;gap:6px;margin-left:auto;color:#5f6368;}
  .gm-top .tr .ti{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:17px;}
  .gm-top .tr .ti:hover{background:#e8eaed;}
  .gm-top .acc{width:32px;height:32px;border-radius:50%;background:#c5221f;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;margin-left:4px;}

  .gm-body{flex:1;display:flex;min-height:0;background:#f6f8fc;}
  .gm-nav{width:232px;padding:8px 8px 8px 8px;overflow-y:auto;}
  .gm-nav .compose{display:flex;align-items:center;gap:12px;background:#c2e7ff;color:#001d35;border:none;border-radius:16px;
    padding:14px 22px 14px 16px;font:inherit;font-size:14px;font-weight:600;cursor:pointer;margin:4px 0 14px;box-shadow:0 1px 3px rgba(0,0,0,.1);}
  .gm-nav .nav{display:flex;align-items:center;gap:16px;padding:8px 12px 8px 22px;border-radius:0 16px 16px 0;color:#202124;font-size:14px;cursor:default;margin-right:6px;}
  .gm-nav .nav .ico{font-size:16px;width:18px;text-align:center;color:#5f6368;}
  .gm-nav .nav .cnt{margin-left:auto;font-size:12.5px;color:#202124;font-weight:600;}
  .gm-nav .nav.on{background:#d3e3fd;font-weight:700;}
  .gm-nav .nav.on .ico{color:#001d35;}

  .gm-main{flex:1;background:#fff;border-radius:16px 0 0 0;margin:0;display:flex;flex-direction:column;min-width:0;position:relative;overflow:hidden;border-top:1px solid #f1f3f4;}
  .gm-tabs{display:flex;align-items:center;padding:0 8px;border-bottom:1px solid #f1f3f4;height:46px;gap:2px;}
  .gm-tabs .gt{display:flex;align-items:center;gap:10px;padding:0 22px;height:46px;font-size:13.5px;color:#5f6368;cursor:default;position:relative;}
  .gm-tabs .gt.on{color:#d93025;font-weight:600;}
  .gm-tabs .gt.on::after{content:"";position:absolute;left:8px;right:8px;bottom:0;height:3px;background:#d93025;border-radius:3px 3px 0 0;}
  .gm-toolbar{display:flex;align-items:center;justify-content:space-between;padding:4px 16px;height:40px;color:#5f6368;font-size:15px;border-bottom:1px solid #f6f8fc;}
  .gm-toolbar .tl{display:flex;align-items:center;gap:16px;}
  .gm-toolbar .tr{display:flex;align-items:center;gap:14px;font-size:12.5px;color:#5f6368;}
  .gm-nav .nav .cnt{margin-left:auto;}
  .gm-nav .grp{padding:12px 12px 2px 22px;font-size:12px;color:#80868b;font-weight:600;}
  .gm-nav .lbl{display:flex;align-items:center;gap:14px;padding:7px 12px 7px 22px;font-size:13.5px;color:#202124;border-radius:0 16px 16px 0;margin-right:6px;cursor:default;}
  .gm-nav .lbl:hover{background:#f1f3f4;}
  .gm-nav .lbl .dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
  .gm-nav .lbl .cnt{margin-left:auto;font-size:12px;color:#5f6368;}
  .grow .att{color:#5f6368;font-size:13px;flex-shrink:0;}
  .gm-list{flex:1;overflow-y:auto;}
  .gm-list::-webkit-scrollbar{width:10px;} .gm-list::-webkit-scrollbar-thumb{background:#dadce0;border-radius:5px;}

  .grow{display:flex;align-items:center;gap:12px;padding:0 16px;height:40px;border-bottom:1px solid #f1f3f4;cursor:pointer;background:#fff;}
  .grow:hover{box-shadow:inset 0 0 0 1px #e8eaed,0 1px 3px rgba(60,64,67,.25);z-index:1;}
  .grow.unread{background:#fff;}
  .grow.read{background:#f6f8fc;}
  .grow .ck{color:#bdc1c6;font-size:15px;}
  .grow .star{color:#dadce0;font-size:15px;}
  .grow .gav{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;}
  .grow .from{width:168px;flex-shrink:0;font-size:13.5px;color:#5f6368;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .grow.unread .from{color:#202124;font-weight:700;}
  .grow .mid{flex:1;min-width:0;font-size:13.5px;color:#5f6368;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .grow .mid .sub{color:#202124;}
  .grow.unread .mid .sub{font-weight:700;}
  .grow .mid .snip{color:#5f6368;}
  .grow .time{font-size:12px;color:#5f6368;flex-shrink:0;}
  .grow.unread .time{color:#202124;font-weight:700;}

  /* 대화 보기 (PC, 리스트 대체) */
  .gm-read{position:absolute;inset:0;background:#fff;display:none;flex-direction:column;}
  .gm-read.show{display:flex;}
  .gr-bar{display:flex;align-items:center;gap:6px;padding:6px 16px;height:48px;color:#5f6368;font-size:17px;border-bottom:1px solid #f1f3f4;}
  .gr-bar .bk{font-size:22px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;}
  .gr-bar .bk:hover{background:#e8eaed;}
  .gr-bar .ti{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:15px;}
  .gr-bar .ti:hover{background:#e8eaed;}
  .gr-scroll{flex:1;overflow-y:auto;padding:18px 28px;}
  .gr-subj{font-size:22px;color:#202124;font-weight:400;margin-bottom:18px;display:flex;align-items:center;gap:10px;}
  .gr-subj .lbl2{font-size:11px;background:#e8eaed;color:#3c4043;border-radius:4px;padding:2px 8px;font-weight:500;}
  .gr-head{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .gr-head .gav{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;}
  .gr-head .who{flex:1;min-width:0;}
  .gr-head .nm{font-size:14px;color:#202124;font-weight:600;}
  .gr-head .em{font-size:12.5px;color:#5f6368;}
  .gr-head .rt{font-size:12.5px;color:#5f6368;}
  .gr-body{font-size:14px;line-height:1.8;color:#202124;white-space:pre-line;}
  .gr-acts{display:flex;gap:10px;margin-top:26px;}
  .gr-acts .ab{display:flex;align-items:center;gap:8px;border:1px solid #dadce0;border-radius:18px;padding:8px 22px;font:inherit;font-size:13.5px;color:#3c4043;cursor:pointer;}
  .gr-acts .ab:hover{background:#f6f8fc;}

  .gm-toast{position:absolute;left:18px;bottom:18px;background:#323232;color:#fff;border-radius:8px;
    padding:13px 18px;font-size:13.5px;box-shadow:0 4px 14px rgba(0,0,0,.3);opacity:0;transform:translateY(12px);transition:.3s;z-index:30;display:flex;align-items:center;gap:18px;}
  .gm-toast.show{opacity:1;transform:none;}
  .gm-toast .un{color:#8ab4f8;font-weight:600;}

  /* ========== Mobile (Gmail 앱) ========== */
  .phone{width:380px;height:760px;background:#000;border-radius:42px;padding:11px;overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.55),0 0 0 2px #2c2c2c;transition:.2s;}
  .phone.r34{height:520px;}
  .phone.flat{background:none;border-radius:0;padding:0;box-shadow:none;}
  .phone.flat .mscreen{border-radius:0;}
  .mscreen{width:100%;height:100%;border-radius:32px;overflow:hidden;background:#fff;display:flex;flex-direction:column;position:relative;}
  .m-status{height:24px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;font-size:12px;font-weight:600;color:#202124;}
  .m-status .batt{width:22px;height:11px;border:1px solid #202124;border-radius:3px;position:relative;padding:1px;}
  .m-status .batt::after{content:"";position:absolute;right:-3px;top:3px;width:2px;height:5px;background:#202124;border-radius:0 1px 1px 0;}
  .m-status .batt i{display:block;width:80%;height:100%;background:#202124;border-radius:1px;}
  .m-sbar{margin:8px 12px 6px;height:50px;background:#eaf1fb;border-radius:26px;display:flex;align-items:center;gap:12px;padding:0 14px;}
  .m-sbar .bg{font-size:20px;color:#5f6368;}
  .m-sbar input{border:none;background:none;outline:none;flex:1;font:inherit;font-size:15px;color:#202124;}
  .m-sbar input::placeholder{color:#5f6368;}
  .m-sbar .ma{width:30px;height:30px;border-radius:50%;background:#c5221f;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;}
  .m-sec{padding:10px 18px 4px;font-size:12.5px;font-weight:600;color:#5f6368;}
  .m-list{flex:1;overflow-y:auto;}
  .m-list::-webkit-scrollbar{display:none;}
  .mrow{display:flex;gap:13px;padding:12px 16px;cursor:pointer;align-items:flex-start;}
  .mrow .gav{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:600;margin-top:2px;}
  .mrow .mid{flex:1;min-width:0;}
  .mrow .l1{display:flex;gap:8px;align-items:center;}
  .mrow .from{flex:1;font-size:14px;color:#202124;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mrow .time{font-size:12px;color:#5f6368;}
  .mrow.unread .from,.mrow.unread .sub{font-weight:700;}
  .mrow .sub{font-size:13.5px;color:#202124;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  .mrow .snip{font-size:13px;color:#5f6368;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  .mrow .star{color:#dadce0;font-size:17px;margin-top:2px;}
  .m-fab{position:absolute;right:18px;bottom:20px;height:52px;border-radius:16px;background:#c2e7ff;color:#001d35;display:flex;align-items:center;gap:9px;padding:0 20px;font-size:14px;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.25);z-index:12;}

  .m-read{position:absolute;inset:0;background:#fff;z-index:20;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s ease;}
  .m-read.open{transform:none;}
  .mr-bar{height:50px;display:flex;align-items:center;gap:8px;padding:0 12px;color:#5f6368;border-bottom:1px solid #f1f3f4;}
  .mr-bar .bk{font-size:24px;width:36px;}
  .mr-bar .sp{flex:1;}
  .mr-bar .ti{font-size:17px;width:34px;text-align:center;}
  .mr-scroll{flex:1;overflow-y:auto;padding:16px;}
  .mr-subj{font-size:20px;color:#202124;margin-bottom:16px;}
  .mr-head{display:flex;align-items:center;gap:11px;margin-bottom:16px;}
  .mr-head .gav{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;}
  .mr-head .nm{font-size:14px;font-weight:600;color:#202124;}
  .mr-head .to{font-size:12.5px;color:#5f6368;}
  .mr-body{font-size:15px;line-height:1.8;color:#202124;white-space:pre-line;}
  .mr-acts{display:flex;gap:10px;padding:12px 16px;border-top:1px solid #f1f3f4;}
  .mr-acts .ab{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;border:1px solid #dadce0;border-radius:18px;padding:9px;font:inherit;font-size:13px;color:#3c4043;}
</style>

function visible(){

  return work.filter(m=>m.shown && (!f || (m.f[lang]+m.s[lang]+m.p[lang]).toLowerCase().includes(f)));
}
const av=m=>[...m.f[lang]][0];

function renderList(){
  const T=UI[lang], list=visible();

      <span class="ck">☐</span><span class="star">☆</span>
      <span class="from">${m.f[lang]}</span>

    <div class="mr-bar"><span class="bk" id="mbBack">←</span><span class="ti">🗄</span><span class="ti">🗑</span><span class="ti">✉</span><span class="sp"></span><span class="ti">⋯</span></div>
    <div class="mr-scroll">
      <div class="mr-subj">${m.s[lang]}</div>
      <div class="mr-head"><div class="gav" style="background:${m.c}">${av(m)}</div>
        <div><div class="nm">${m.f[lang]}</div><div class="to">${T.to}　${m.t}</div></div></div>
      <div class="mr-body">${m.b[lang]}</div></div>
    <div class="mr-acts"><button class="ab">↩ ${T.reply}</button><button class="ab">➡ ${T.forward}</button></div>`;
  $("mbBack").onclick=closeMail;
  if(dev==="mobile")$("mbRead").classList.add("open");
}
function closeMail(){
  openId=null; $("pcRead").classList.remove("show"); $("mbRead").classList.remove("open"); renderList();
}

async function toast(m){
  $("toastUn").textContent=UI[lang].newmsg+" · "+m.f[lang];
  $("toastTx").textContent="";
  $("gmToast").classList.add("show");
  await sleep(2600); $("gmToast").classList.remove("show");
}
async function typeSearch(term){
  const box=dev==="pc"?$("pcSearch"):$("mbSearch");
  for(let i=1;i<=term.length;i++){ filter=term.slice(0,i); box.value=filter; renderList(); await sleep(160); }
}
async function clearSearch(){ filter=""; $("pcSearch").value="";$("mbSearch").value=""; renderList(); }

async function play(){
  const t=++token;
  closeMail(); filter=""; $("pcSearch").value="";$("mbSearch").value="";
  work=initial(); paintStatic(); renderList();
  const q=queue();
  await sleep(900); if(t!==token)return;
  for(const nm of q){
    if(t!==token)return;
    work.unshift({...nm}); renderList(); $("pcList").scrollTop=0;$("mbList").scrollTop=0; toast(nm);
    await sleep(2400);
  }
  if(t!==token)return;
  let a=work.find(m=>m.unread)||work[0];
  openMail(a.id); await sleep(2800); if(t!==token)return; closeMail(); await sleep(700); if(t!==token)return;
  let b=work.find(m=>m.unread&&m.id!==a.id)||work[2];
  if(b){openMail(b.id); await sleep(2800); if(t!==token)return; closeMail(); await sleep(700);}
  if(t!==token)return;
  await typeSearch(scenarios[cur].q[lang]); if(t!==token)return;
  await sleep(2200); if(t!==token)return; await clearSearch();
}

$("pcSearch").addEventListener("input",e=>{filter=e.target.value;renderList();$("mbSearch").value=e.target.value;});
$("mbSearch").addEventListener("input",e=>{filter=e.target.value;renderList();$("pcSearch").value=e.target.value;});

function applyDevice(){
  $("gwin").style.display=dev==="pc"?"flex":"none";
  $("phone").style.display=dev==="pc"?"none":"block";
  $("ratioRow").style.display=dev==="pc"?"none":"flex";
}
document.querySelectorAll(".btn.dev").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".btn.dev").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");dev=b.dataset.dev;applyDevice();play();
}));
document.querySelectorAll(".btn.lang").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".btn.lang").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");lang=b.dataset.lang;document.documentElement.lang=lang;play();
}));
$("mockup").addEventListener("change",e=>{
  $("gwin").classList.toggle("flat",!e.target.checked);
  $("phone").classList.toggle("flat",!e.target.checked);
});
document.querySelectorAll(".btn.ratio").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".btn.ratio").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");$("phone").classList.toggle("r34",b.dataset.ratio==="34");
}));
$("replay").onclick=play;

/* ===== 화면 녹화 → MP4 저장 ===== */
const recBtn=$("recBtn");
let _rec=null,_chunks=[],_recording=false;
function _recTarget(){return dev==="pc"?$("gwin"):$("phone");}
function _pickMime(){
  const c=["video/mp4;codecs=avc1.42E01E,mp4a.40.2","video/mp4;codecs=avc1","video/mp4",
           "video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm"];
  for(const m of c) if(window.MediaRecorder&&MediaRecorder.isTypeSupported(m)) return m;
  return "";
}
async function _startRec(){
  if(_recording)return;
  if(!navigator.mediaDevices||!navigator.mediaDevices.getDisplayMedia){alert("이 브라우저는 화면 녹화를 지원하지 않습니다. Chrome/Edge에서 열어주세요.");return;}
  let stream;
  try{ stream=await navigator.mediaDevices.getDisplayMedia({preferCurrentTab:true,video:{frameRate:30},audio:false}); }
  catch(e){ return; }
  try{
    if(window.CropTarget&&CropTarget.fromElement){
      const ct=await CropTarget.fromElement(_recTarget());
      const vt=stream.getVideoTracks()[0];
      if(vt.cropTo) await vt.cropTo(ct);
    }
  }catch(e){}
  const mime=_pickMime();
  _chunks=[];
  try{ _rec=new MediaRecorder(stream,mime?{mimeType:mime,videoBitsPerSecond:8000000}:{}); }
  catch(e){ _rec=new MediaRecorder(stream); }
  _rec.ondataavailable=e=>{if(e.data&&e.data.size)_chunks.push(e.data);};
  _rec.onstop=()=>{
    stream.getTracks().forEach(t=>t.stop());
    const type=_rec.mimeType||mime||"video/webm";
    const ext=type.indexOf("mp4")>=0?"mp4":"webm";
    const blob=new Blob(_chunks,{type});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download="gmail-demo-"+Date.now()+"."+ext; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
    _recording=false; recBtn.textContent="🔴 MP4 녹화"; recBtn.style.background="#c0392b";
  };
  stream.getVideoTracks()[0].addEventListener("ended",()=>{ if(_recording)_rec.stop(); });
  _recording=true; recBtn.textContent="⏹ 녹화 중지 / 저장"; recBtn.style.background="#7f1d1d";
  _rec.start();
  await play();
  await sleep(800);
  if(_recording)_rec.stop();
}
recBtn.onclick=()=>{ _recording? _rec.stop() : _startRec(); };

applyDevice(); play();
</script>
