<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outlook風 メール デモ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  body{font-family:"Noto Sans JP","Segoe UI",sans-serif;background:#202730;min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px 16px 40px 320px;}

  /* ===== 조작 패널 ===== */
  .controls{width:280px;flex-shrink:0;position:fixed;left:20px;top:24px;
    background:#2b333d;border:1px solid #3b4654;border-radius:14px;padding:14px 16px;color:#cdd6e0;z-index:50;}
  .controls h2{font-size:13px;font-weight:600;color:#8ea3b8;margin:12px 0 8px;letter-spacing:.02em;}
  .lbl{font-size:12px;color:#8ea3b8;margin-bottom:6px;}
  .seg{display:flex;gap:6px;margin-bottom:6px;}
  .seg .btn{flex:1;text-align:center;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:6px;}
  .chip{border:1px solid #45525f;background:#333d49;color:#c7d2dd;font-size:12.5px;
    padding:6px 11px;border-radius:999px;cursor:pointer;transition:.15s;white-space:nowrap;}
  .chip:hover{background:#3d4956;}
  .chip.active{background:#0f6cbd;border-color:#0f6cbd;color:#fff;font-weight:600;}
  .row2{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px;}
  .btn{border:none;background:#3f4b58;color:#dfe7ef;font-size:12.5px;padding:7px 12px;border-radius:8px;cursor:pointer;transition:.15s;}
  .btn:hover{background:#4a5867;}
  .btn.active{background:#0f6cbd;color:#fff;font-weight:600;}
  .toggle{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#aebccb;cursor:pointer;user-select:none;}
  .toggle input{width:15px;height:15px;accent-color:#0f6cbd;cursor:pointer;}

  /* ===== 무대 ===== */
  .stage{display:flex;align-items:center;justify-content:center;}

  /* ========== PC (데스크톱 Outlook) ========== */
  .pcwin{width:1000px;height:624px;background:#faf9f8;border-radius:10px;overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.5);display:flex;flex-direction:column;position:relative;}
  .pcwin.flat{border-radius:0;box-shadow:none;}
  .pc-top{height:48px;background:#fff;border-bottom:1px solid #edebe9;display:flex;align-items:center;gap:12px;padding:0 14px;}
  .pc-top .logo{display:flex;align-items:center;gap:8px;font-weight:600;color:#0f6cbd;font-size:15px;}
  .pc-top .logo .sq{width:20px;height:20px;border-radius:4px;background:#0f6cbd;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;}
  .pc-search{flex:1;max-width:420px;margin:0 auto;height:30px;background:#f3f2f1;border:1px solid #e1dfdd;border-radius:6px;
    display:flex;align-items:center;gap:8px;padding:0 10px;color:#605e5c;font-size:13px;}
  .pc-search input{border:none;background:none;outline:none;flex:1;font:inherit;color:#323130;}
  .pc-top .tr{display:flex;align-items:center;gap:14px;color:#605e5c;margin-left:auto;}
  .pc-top .tr .dot{width:18px;height:18px;}
  .pc-ribbon{height:36px;background:#fff;border-bottom:1px solid #edebe9;display:flex;align-items:center;gap:18px;padding:0 16px;font-size:13px;color:#444;}
  .pc-ribbon .rt{padding:7px 2px;cursor:default;}
  .pc-ribbon .rt.on{color:#0f6cbd;font-weight:600;box-shadow:inset 0 -2px 0 #0f6cbd;}

  .pc-body{flex:1;display:flex;min-height:0;}
  .pc-nav{width:200px;background:#faf9f8;border-right:1px solid #edebe9;padding:10px 8px;overflow-y:auto;font-size:13px;}
  .pc-nav .newbtn{width:100%;background:#0f6cbd;color:#fff;border:none;border-radius:6px;padding:8px;font:inherit;font-weight:600;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;gap:7px;justify-content:center;}
  .pc-nav .navsec{color:#8a8886;font-size:11.5px;font-weight:600;margin:10px 6px 4px;}
  .pc-nav .nav{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:5px;color:#323130;cursor:default;}
  .pc-nav .nav .ico{width:16px;text-align:center;opacity:.7;}
  .pc-nav .nav .cnt{margin-left:auto;color:#8a8886;font-size:12px;}
  .pc-nav .nav.on{background:#eef6fc;color:#0f6cbd;font-weight:600;}
  .pc-nav .nav.on .cnt{color:#0f6cbd;}

  .pc-list{width:368px;background:#fff;border-right:1px solid #edebe9;display:flex;flex-direction:column;min-width:0;}
  .pc-list .lhead{display:flex;align-items:center;gap:18px;padding:10px 14px 0;}
  .pc-list .ft{font-size:14px;color:#605e5c;padding-bottom:8px;cursor:default;}
  .pc-list .ft.on{color:#323130;font-weight:600;box-shadow:inset 0 -2px 0 #0f6cbd;}
  .pc-list .scroll{flex:1;overflow-y:auto;}
  .pc-list .scroll::-webkit-scrollbar{width:8px;}
  .pc-list .scroll::-webkit-scrollbar-thumb{background:#d2d0ce;border-radius:4px;}

  .grphd{padding:8px 14px 4px;font-size:12px;font-weight:600;color:#605e5c;background:#fff;position:sticky;top:0;}
  .mailrow{display:flex;gap:10px;padding:9px 12px 9px 10px;border-bottom:1px solid #f3f2f1;cursor:pointer;position:relative;}
  .mailrow:hover{background:#f8f8f8;}
  .mailrow.sel{background:#eaf2fb;}
  .mailrow.sel::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:#0f6cbd;}
  .mailrow .av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;margin-top:2px;}
  .mailrow .mid{flex:1;min-width:0;}
  .mailrow .l1{display:flex;align-items:center;gap:6px;}
  .mailrow .from{font-size:13.5px;color:#201f1e;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mailrow .time{font-size:12px;color:#8a8886;flex-shrink:0;}
  .mailrow .subj{font-size:13px;color:#201f1e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  .mailrow .prev{font-size:12.5px;color:#8a8886;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  .mailrow.unread .from{font-weight:700;}
  .mailrow.unread .subj{font-weight:700;color:#0f6cbd;}
  .mailrow.unread .udot{position:absolute;left:3px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:#0f6cbd;}

  .pc-read{flex:1;background:#fff;display:flex;flex-direction:column;min-width:0;}
  .pc-read .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#a19f9d;gap:10px;}
  .pc-read .empty .ic{font-size:46px;opacity:.4;}
  .rd{flex:1;display:flex;flex-direction:column;min-height:0;}
  .rd .rsubj{font-size:19px;font-weight:600;color:#201f1e;padding:16px 22px 8px;}
  .rd .rhead{display:flex;align-items:center;gap:11px;padding:4px 22px 14px;border-bottom:1px solid #edebe9;}
  .rd .rhead .av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:600;flex-shrink:0;}
  .rd .rhead .who{flex:1;min-width:0;}
  .rd .rhead .nm{font-size:14px;font-weight:600;color:#201f1e;}
  .rd .rhead .to{font-size:12.5px;color:#8a8886;}
  .rd .rhead .rtime{font-size:12.5px;color:#8a8886;}
  .rd .rbody{flex:1;overflow-y:auto;padding:18px 22px;font-size:14px;line-height:1.7;color:#323130;white-space:pre-line;}
  .rd .ract{display:flex;gap:8px;padding:12px 22px;border-top:1px solid #edebe9;}
  .rd .ract .ab{border:1px solid #d2d0ce;background:#fff;border-radius:6px;padding:7px 16px;font:inherit;font-size:13px;color:#323130;cursor:pointer;display:flex;align-items:center;gap:6px;}
  .rd .ract .ab:hover{background:#f3f2f1;}

  /* 토스트 */
  .toast{position:absolute;right:18px;bottom:18px;background:#fff;border:1px solid #e1dfdd;border-left:4px solid #0f6cbd;
    border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.18);padding:11px 14px;min-width:230px;max-width:300px;
    opacity:0;transform:translateY(12px);transition:.3s;z-index:30;pointer-events:none;}
  .toast.show{opacity:1;transform:none;}
  .toast .tt{font-size:12px;color:#0f6cbd;font-weight:600;margin-bottom:3px;}
  .toast .tf{font-size:13px;font-weight:600;color:#201f1e;}
  .toast .ts{font-size:12.5px;color:#605e5c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* ========== Mobile (Outlook 앱) ========== */
  .phone{width:380px;height:760px;background:#000;border-radius:42px;padding:11px;overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.55),0 0 0 2px #2c2c2c;transition:.2s;}
  .phone.r34{height:520px;}
  .phone.flat{background:none;border-radius:0;padding:0;box-shadow:none;}
  .phone.flat .mscreen{border-radius:0;}
  .mscreen{width:100%;height:100%;border-radius:32px;overflow:hidden;background:#fff;display:flex;flex-direction:column;position:relative;}
  .m-status{height:24px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;font-size:12px;font-weight:600;color:#201f1e;}
  .m-status .batt{width:22px;height:11px;border:1px solid #201f1e;border-radius:3px;position:relative;padding:1px;}
  .m-status .batt::after{content:"";position:absolute;right:-3px;top:3px;width:2px;height:5px;background:#201f1e;border-radius:0 1px 1px 0;}
  .m-status .batt i{display:block;width:80%;height:100%;background:#201f1e;border-radius:1px;}
  .m-head{padding:6px 14px 8px;border-bottom:1px solid #edebe9;}
  .m-head .r1{display:flex;align-items:center;gap:12px;}
  .m-head .mav{width:30px;height:30px;border-radius:50%;background:#0f6cbd;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
  .m-head .mtit{font-size:20px;font-weight:700;color:#201f1e;flex:1;}
  .m-head .mic{color:#605e5c;font-size:18px;}
  .m-search{margin-top:10px;height:36px;background:#f3f2f1;border-radius:8px;display:flex;align-items:center;gap:8px;padding:0 12px;color:#8a8886;font-size:14px;}
  .m-search input{border:none;background:none;outline:none;flex:1;font:inherit;color:#323130;}
  .m-tabs{display:flex;gap:22px;padding:8px 16px 0;}
  .m-tabs .mt{font-size:14px;color:#8a8886;padding-bottom:8px;}
  .m-tabs .mt.on{color:#0f6cbd;font-weight:600;box-shadow:inset 0 -2px 0 #0f6cbd;}
  .m-list{flex:1;overflow-y:auto;}
  .m-list::-webkit-scrollbar{display:none;}
  .mrow{display:flex;gap:11px;padding:12px 14px;border-bottom:1px solid #f3f2f1;cursor:pointer;position:relative;}
  .mrow:active{background:#f5f5f5;}
  .mrow .av{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:600;}
  .mrow .mid{flex:1;min-width:0;}
  .mrow .l1{display:flex;gap:6px;align-items:center;}
  .mrow .from{font-size:14.5px;color:#201f1e;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mrow .time{font-size:12px;color:#8a8886;}
  .mrow .subj{font-size:13.5px;color:#201f1e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  .mrow .prev{font-size:13px;color:#8a8886;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  .mrow.unread .from,.mrow.unread .subj{font-weight:700;}
  .mrow.unread .udot{position:absolute;left:4px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:#0f6cbd;}
  .mgrp{padding:10px 16px 4px;font-size:12.5px;font-weight:600;color:#605e5c;}
  .m-compose{position:absolute;right:18px;bottom:74px;width:52px;height:52px;border-radius:14px;background:#0f6cbd;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 6px 16px rgba(15,108,189,.4);z-index:12;}
  .m-bottom{height:54px;border-top:1px solid #edebe9;display:flex;align-items:center;justify-content:space-around;color:#8a8886;font-size:11px;}
  .m-bottom .bn{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .m-bottom .bn.on{color:#0f6cbd;}
  .m-bottom .bn .bi{font-size:18px;}

  .m-read{position:absolute;inset:0;background:#fff;z-index:20;display:flex;flex-direction:column;
    transform:translateX(100%);transition:transform .28s ease;}
  .m-read.open{transform:none;}
  .m-read .mr-top{height:50px;display:flex;align-items:center;gap:14px;padding:0 14px;border-bottom:1px solid #edebe9;color:#0f6cbd;}
  .m-read .mr-top .bk{font-size:24px;}
  .m-read .mr-top .sp{flex:1;}
  .m-read .mr-top .mic{color:#605e5c;font-size:17px;}
  .m-read .mr-subj{font-size:19px;font-weight:700;color:#201f1e;padding:14px 16px 10px;}
  .m-read .mr-from{display:flex;align-items:center;gap:11px;padding:0 16px 14px;border-bottom:1px solid #edebe9;}
  .m-read .mr-from .av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;}
  .m-read .mr-from .nm{font-size:14px;font-weight:600;color:#201f1e;}
  .m-read .mr-from .to{font-size:12.5px;color:#8a8886;}
  .m-read .mr-body{flex:1;overflow-y:auto;padding:16px;font-size:15px;line-height:1.75;color:#323130;white-space:pre-line;}
  .m-read .mr-act{display:flex;gap:8px;padding:10px 14px;border-top:1px solid #edebe9;}
  .m-read .mr-act .ab{flex:1;border:1px solid #d2d0ce;background:#fff;border-radius:8px;padding:9px;font:inherit;font-size:13px;color:#323130;text-align:center;}

  /* ===== Outlook PC 충실도 보강 ===== */
  .pcwin{width:1020px;height:648px;background:#f3f2f1;}
  .pc-title{height:46px;background:#f5f4f2;display:flex;align-items:center;gap:12px;padding:0 0 0 12px;}
  .pc-title .logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;color:#0a2a4d;}
  .pc-title .logo svg{display:block;}
  .pc-search{flex:0 1 480px;margin:0 auto;height:30px;background:#fff;border:1px solid #e1dfdd;border-radius:6px;display:flex;align-items:center;gap:8px;padding:0 10px;color:#605e5c;font-size:13px;box-shadow:0 1px 1px rgba(0,0,0,.04);}
  .pc-search input{border:none;background:none;outline:none;flex:1;font:inherit;color:#323130;}
  .pc-title .tr{display:flex;align-items:center;margin-left:auto;}
  .pc-title .ti{width:40px;height:46px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#555;}
  .pc-title .ti:hover{background:#eceae9;}
  .pc-title .wbtns{display:flex;height:46px;margin-left:6px;}
  .pc-title .wb{width:46px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#444;}
  .pc-title .wb:hover{background:#e5e5e5;}
  .pc-title .wb.cl:hover{background:#e81123;color:#fff;}

  .pc-tabs{height:34px;background:#f5f4f2;display:flex;align-items:center;gap:2px;padding:0 12px;border-bottom:1px solid #edebe9;}
  .pc-tabs .rt{font-size:13px;color:#444;padding:6px 10px;border-radius:4px;position:relative;cursor:default;}
  .pc-tabs .rt.on{color:#0f6cbd;font-weight:600;}
  .pc-tabs .rt.on::after{content:"";position:absolute;left:8px;right:8px;bottom:-1px;height:2px;background:#0f6cbd;}

  .pc-cmd{height:44px;background:#fff;display:flex;align-items:center;padding:0 8px;border-bottom:1px solid #edebe9;font-size:12.5px;color:#323130;overflow:hidden;}
  .pc-cmd .ci{display:flex;align-items:center;gap:6px;padding:7px 9px;border-radius:5px;white-space:nowrap;cursor:default;}
  .pc-cmd .ci:hover{background:#f3f2f1;}
  .pc-cmd .ci .g{font-size:14px;}
  .pc-cmd .sep{width:1px;height:20px;background:#e1dfdd;margin:0 5px;}

  .pc-main{flex:1;display:flex;min-height:0;}
  .pc-rail{width:48px;background:#f5f4f2;border-right:1px solid #edebe9;display:flex;flex-direction:column;align-items:center;padding-top:8px;gap:4px;}
  .pc-rail .ri{width:40px;height:40px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:17px;color:#605e5c;position:relative;cursor:default;}
  .pc-rail .ri:hover{background:#eceae9;}
  .pc-rail .ri.on{color:#0f6cbd;}
  .pc-rail .ri.on::before{content:"";position:absolute;left:-4px;top:9px;bottom:9px;width:3px;border-radius:2px;background:#0f6cbd;}

  .pc-nav{width:212px;background:#f5f4f2;}
  .pc-list .lhead{display:flex;align-items:center;padding:10px 12px 0;gap:10px;}
  .pc-list .fts{display:flex;gap:18px;flex:1;}
  .pc-list .filter{color:#605e5c;font-size:14px;padding-bottom:8px;}

  .mailrow.unread .udot{left:0;top:9px;bottom:9px;width:3px;height:auto;border-radius:0 2px 2px 0;transform:none;}

  .rd .rtools{display:flex;align-items:center;gap:2px;padding:8px 14px 0;}
  .rd .rtools .sp{flex:1;}
  .rd .rtools .ti{width:32px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:5px;color:#555;font-size:14px;cursor:default;}
  .rd .rtools .ti:hover{background:#f3f2f1;}
  .rd .rsubj{padding-top:10px;}
</style>
</head>
<body>

  <div class="controls">
    <div class="lbl">기기</div>
    <div class="seg">
      <button class="btn dev active" data-dev="pc">🖥 PC</button>
      <button class="btn dev" data-dev="mobile">📱 Mobile</button>
    </div>
    <div class="lbl">언어 (화면 표시 언어)</div>
    <div class="seg">
      <button class="btn lang active" data-lang="ja">日本語</button>
      <button class="btn lang" data-lang="en">English</button>
    </div>
    <h2>직무/산업 선택</h2>
    <div class="chips" id="chips"></div>
    <div class="row2">
      <button class="btn" id="replay">▶ 시나리오 재생</button>
    </div>
    <div class="row2">
      <label class="toggle"><input type="checkbox" id="mockup" checked> 목업/창 테두리</label>
    </div>
    <div class="row2" id="ratioRow" style="display:none;">
      <span style="font-size:12.5px;color:#aebccb;">비율</span>
      <button class="btn ratio active" data-ratio="916">9:16</button>
      <button class="btn ratio" data-ratio="34">3:4</button>
    </div>
    <div class="row2">
      <button class="btn" id="recBtn" style="background:#c0392b;color:#fff;">🔴 MP4 녹화</button>
      <span style="font-size:11.5px;color:#6f8194;">화면 공유에서 <b>이 탭</b> 선택 → 자동 저장</span>
    </div>
    <div class="row2"><span style="font-size:11.5px;color:#6f8194;">메일 행을 직접 클릭/검색해도 됩니다</span></div>
  </div>

  <div class="stage">
    <!-- ===== PC ===== -->
    <div class="pcwin" id="pcwin">
      <div class="pc-title">
        <div class="logo">
          <svg width="22" height="22" viewBox="0 0 32 32"><rect x="14" y="6" width="17" height="20" rx="2.5" fill="#0F6CBD"/><path d="M16 11h13v1.6H16zM16 15h13v1.6H16zM16 19h9v1.6h-9z" fill="#fff" opacity=".95"/><rect x="1" y="9" width="16" height="16" rx="3" fill="#0A4F8F"/><text x="9" y="21" font-size="12" font-weight="700" fill="#fff" text-anchor="middle" font-family="Arial,sans-serif">O</text></svg>
          Outlook
        </div>
        <div class="pc-search">🔍 <input id="pcSearch" placeholder="検索"></div>
        <div class="tr">
          <span class="ti">▦</span><span class="ti">🔔</span><span class="ti">⚙</span>
          <div class="wbtns"><span class="wb">─</span><span class="wb">▢</span><span class="wb cl">✕</span></div>
        </div>
      </div>
      <div class="pc-tabs" id="pcRibbon"></div>
      <div class="pc-cmd" id="pcCmd"></div>
      <div class="pc-main">
        <div class="pc-rail">
          <span class="ri on">✉</span><span class="ri">📅</span><span class="ri">👥</span><span class="ri">☑</span><span class="ri">📁</span>
        </div>

    <div class="nav on"><span class="ico">📥</span>${T.inbox}<span class="cnt" id="favInbox"></span></div>
    <div class="nav"><span class="ico">💳</span>${T.expenses}</div>
    <div class="nav"><span class="ico">📄</span>${T.invoices}</div>
    <div class="navsec">katyreid@outlook.com</div>
    <div class="nav on"><span class="ico">📥</span>${T.inbox}<span class="cnt" id="navInbox"></span></div>
    <div class="nav"><span class="ico">📝</span>${T.drafts}</div>
    <div class="nav"><span class="ico">📤</span>${T.sent}</div>
    <div class="nav"><span class="ico">🗑</span>${T.deleted}</div>
    <div class="nav"><span class="ico">🚫</span>${T.junk}</div>
    <div class="nav"><span class="ico">🗄</span>${T.archive}</div>`;
  $("pcFocused").textContent=T.focused;$("pcOther").textContent=T.other;
  $("pcSearch").placeholder=T.search;$("mbSearch").placeholder=T.search;
  $("mbTitle").textContent=T.inbox;$("mbFocused").textContent=T.focused;$("mbOther").textContent=T.other;
  $("toastTt").textContent=T.newmail;
  const bi=["📧","📅","👥","⚙"];
  $("mbBottom").innerHTML=T.bottom.map((b,i)=>`<div class="bn${i===0?" on":""}"><span class="bi">${bi[i]}</span>${b}</div>`).join("");
}

/* ===== 렌더 ===== */
function visible(){
  const f=filter.trim().toLowerCase();
  return work.filter(m=>m.shown && (!f ||
    (m.f[lang]+m.s[lang]+m.p[lang]).toLowerCase().includes(f)));
}
function av(m){return [...m.f[lang]][0];}

function renderList(){
  const T=UI[lang], list=visible();
  // counts
  const cnt=work.filter(m=>m.shown&&m.unread).length;
  if($("favInbox"))$("favInbox").textContent=cnt;
  if($("navInbox"))$("navInbox").textContent=cnt;
  // PC
  let html="",g=null;
  list.forEach(m=>{
    if(m.g!==g){g=m.g;html+=`<div class="grphd">${g==="today"?T.today:g==="yest"?T.yest:T.older}</div>`;}
    html+=`<div class="mailrow${m.unread?" unread":""}${m.id===openId?" sel":""}" data-id="${m.id}">
      ${m.unread?'<span class="udot"></span>':''}
      <div class="av" style="background:${m.c}">${av(m)}</div>
      <div class="mid"><div class="l1"><span class="from">${m.f[lang]}</span><span class="time">${m.t}</span></div>
      <div class="subj">${m.s[lang]}</div><div class="prev">${m.p[lang]}</div></div></div>`;
  });
  $("pcList").innerHTML=html;
  $("pcList").querySelectorAll(".mailrow").forEach(r=>r.onclick=()=>openMail(r.dataset.id));
  // Mobile
  let mh="";g=null;
  list.forEach(m=>{
    if(m.g!==g){g=m.g;mh+=`<div class="mgrp">${g==="today"?T.today:g==="yest"?T.yest:T.older}</div>`;}
    mh+=`<div class="mrow${m.unread?" unread":""}" data-id="${m.id}">
      ${m.unread?'<span class="udot"></span>':''}
      <div class="av" style="background:${m.c}">${av(m)}</div>
      <div class="mid"><div class="l1"><span class="from">${m.f[lang]}</span><span class="time">${m.t}</span></div>
      <div class="subj">${m.s[lang]}</div><div class="prev">${m.p[lang]}</div></div></div>`;
  });
  $("mbList").innerHTML=mh;
  $("mbList").querySelectorAll(".mrow").forEach(r=>r.onclick=()=>openMail(r.dataset.id));
}

function emptyRead(){
  $("pcRead").innerHTML=`<div class="empty"><div class="ic">✉</div><div>${UI[lang].empty}</div></div>`;
}
function openMail(id){
  const m=work.find(x=>x.id===id); if(!m)return;
  m.unread=false; openId=id;
  const T=UI[lang];
  renderList();
  // PC reading pane
  $("pcRead").innerHTML=`<div class="rd">
    <div class="rtools"><span class="sp"></span><span class="ti">↩</span><span class="ti">↪</span><span class="ti">➡</span><span class="ti">🗑</span><span class="ti">🚩</span><span class="ti">⋯</span></div>
    <div class="rsubj">${m.s[lang]}</div>
    <div class="rhead"><div class="av" style="background:${m.c}">${av(m)}</div>
      <div class="who"><div class="nm">${m.f[lang]}</div><div class="to">${T.to}</div></div>
      <div class="rtime">${m.t}</div></div>
    <div class="rbody">${m.b[lang]}</div>
    <div class="ract"><button class="ab">↩ ${T.reply}</button><button class="ab">↩ ${T.replyall}</button><button class="ab">➡ ${T.forward}</button></div>
  </div>`;
  // Mobile reading
  $("mbRead").innerHTML=`
    <div class="mr-top"><span class="bk" id="mbBack">‹</span><span class="sp"></span><span class="mic">↩</span><span class="mic">🗑</span><span class="mic">⋯</span></div>
    <div class="mr-subj">${m.s[lang]}</div>
    <div class="mr-from"><div class="av" style="background:${m.c}">${av(m)}</div>
      <div><div class="nm">${m.f[lang]}</div><div class="to">${T.to}</div></div></div>
    <div class="mr-body">${m.b[lang]}</div>
    <div class="mr-act"><button class="ab">↩ ${T.reply}</button><button class="ab">↩ ${T.replyall}</button><button class="ab">➡ ${T.forward}</button></div>`;
  $("mbBack").onclick=closeMail;
  if(dev==="mobile")$("mbRead").classList.add("open");
}
function closeMail(){
  openId=null; renderList(); emptyRead(); $("mbRead").classList.remove("open");
}

/* 토스트 */
async function toast(m){
  $("toastFrom").textContent=m.f[lang];$("toastSub").textContent=m.s[lang];
  $("pcToast").classList.add("show");
  await sleep(2600); $("pcToast").classList.remove("show");
}

/* 검색 타이핑 */
async function typeSearch(term){
  const box = dev==="pc"?$("pcSearch"):$("mbSearch");
  for(let i=1;i<=term.length;i++){
    if(box._t!==undefined && box._t!==token)return;
    filter=term.slice(0,i); box.value=filter; renderList();
    await sleep(160);
  }
}
async function clearSearch(){
  filter=""; $("pcSearch").value="";$("mbSearch").value=""; renderList();
}

/* ===== 자동 시나리오 ===== */
async function play(){
  const t=++token;
  closeMail(); filter=""; $("pcSearch").value="";$("mbSearch").value="";
  work=initial(); pending=queue(); paintStatic(); renderList(); emptyRead();
  const scrollTop=()=>{ $("pcList").scrollTop=0; $("mbList").scrollTop=0; };
  await sleep(900); if(t!==token)return;
  // 1) 새 메일 2건 도착
  for(const nm of pending){
    if(t!==token)return;
    work.unshift({...nm}); renderList(); scrollTop(); toast(nm);
    await sleep(2400);
  }
  if(t!==token)return;
  // 2) 첫 메일 열기 → 닫기
  let target=work.find(m=>m.unread)||work[0];
  openMail(target.id); await sleep(2800); if(t!==token)return;
  closeMail(); await sleep(700); if(t!==token)return;
  // 3) 다른 메일 열기 → 닫기
  let target2=work.find(m=>m.unread&&m.id!==target.id)||work[2];
  if(target2){openMail(target2.id); await sleep(2800); if(t!==token)return; closeMail(); await sleep(700);}
  if(t!==token)return;
  // 4) 검색
  await typeSearch(scenarios[cur].q[lang]); if(t!==token)return;
  await sleep(2200); if(t!==token)return;
  await clearSearch();
}

/* ===== 수동 검색 입력 ===== */
$("pcSearch").addEventListener("input",e=>{filter=e.target.value;renderList();$("mbSearch").value=e.target.value;});
$("mbSearch").addEventListener("input",e=>{filter=e.target.value;renderList();$("pcSearch").value=e.target.value;});

/* ===== 컨트롤 ===== */
function applyDevice(){
  $("pcwin").style.display = dev==="pc"?"flex":"none";
  $("phone").style.display = dev==="pc"?"none":"block";
  $("ratioRow").style.display = dev==="pc"?"none":"flex";
}
document.querySelectorAll(".btn.dev").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".btn.dev").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); dev=b.dataset.dev; applyDevice(); play();
}));
document.querySelectorAll(".btn.lang").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".btn.lang").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); lang=b.dataset.lang; document.documentElement.lang=lang; play();
}));
$("mockup").addEventListener("change",e=>{
  $("pcwin").classList.toggle("flat",!e.target.checked);
  $("phone").classList.toggle("flat",!e.target.checked);
});
document.querySelectorAll(".btn.ratio").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".btn.ratio").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); $("phone").classList.toggle("r34",b.dataset.ratio==="34");
}));
$("replay").onclick=play;

/* ===== 화면 녹화 → MP4 저장 ===== */
const recBtn=$("recBtn");
let _rec=null,_chunks=[],_recording=false;
function _recTarget(){return dev==="pc"?$("pcwin"):$("phone");}
function _pickMime(){
  const c=["video/mp4;codecs=avc1.42E01E,mp4a.40.2","video/mp4;codecs=avc1","video/mp4",
           "video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm"];
  for(const m of c) if(window.MediaRecorder&&MediaRecorder.isTypeSupported(m)) return m;
  return "";
}
async function _startRec(){
  if(_recording)return;
  if(!navigator.mediaDevices||!navigator.mediaDevices.getDisplayMedia){alert("이 브라우저는 화면 녹화를 지원하지 않습니다. Chrome/Edge에서 열어주세요.");return;}
  let stream;
  try{ stream=await navigator.mediaDevices.getDisplayMedia({preferCurrentTab:true,video:{frameRate:30},audio:false}); }
  catch(e){ return; }
  try{
    if(window.CropTarget&&CropTarget.fromElement){
      const ct=await CropTarget.fromElement(_recTarget());
      const vt=stream.getVideoTracks()[0];
      if(vt.cropTo) await vt.cropTo(ct);
    }
  }catch(e){}
  const mime=_pickMime();
  _chunks=[];
  try{ _rec=new MediaRecorder(stream,mime?{mimeType:mime,videoBitsPerSecond:8000000}:{}); }
  catch(e){ _rec=new MediaRecorder(stream); }
  _rec.ondataavailable=e=>{if(e.data&&e.data.size)_chunks.push(e.data);};
  _rec.onstop=()=>{
    stream.getTracks().forEach(t=>t.stop());
    const type=_rec.mimeType||mime||"video/webm";
    const ext=type.indexOf("mp4")>=0?"mp4":"webm";
    const blob=new Blob(_chunks,{type});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download="outlook-demo-"+Date.now()+"."+ext; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
    _recording=false; recBtn.textContent="🔴 MP4 녹화"; recBtn.style.background="#c0392b";
  };
  stream.getVideoTracks()[0].addEventListener("ended",()=>{ if(_recording)_rec.stop(); });
  _recording=true; recBtn.textContent="⏹ 녹화 중지 / 저장"; recBtn.style.background="#7f1d1d";
  _rec.start();
  await play();
  await sleep(800);
  if(_recording)_rec.stop();
}
recBtn.onclick=()=>{ _recording? _rec.stop() : _startRec(); };

applyDevice(); play();
</script>
