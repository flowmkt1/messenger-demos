<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  body{
    font-family:"Noto Sans JP","Segoe UI",sans-serif;
    background:#202730;
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:24px;padding:32px 16px 40px;
  }

  /* ===== 조작 패널 (운영자용 · 좌측 고정) ===== */
  .controls{
    width:280px;flex-shrink:0;position:fixed;left:20px;top:32px;
    background:#2b333d;border:1px solid #3b4654;border-radius:14px;
    padding:14px 16px;color:#cdd6e0;
  }
  .controls h2{font-size:13px;font-weight:600;color:#8ea3b8;margin-bottom:10px;letter-spacing:.02em;}
  .seg{display:flex;gap:6px;margin-bottom:14px;}
  .seg .btn{flex:1;text-align:center;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
  .chip{border:1px solid #45525f;background:#333d49;color:#c7d2dd;font-size:13px;
    padding:7px 13px;border-radius:999px;cursor:pointer;transition:.15s;white-space:nowrap;}
  .chip:hover{background:#3d4956;}
  .chip.active{background:#25d366;border-color:#25d366;color:#0b1f12;font-weight:600;}
  .row2{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .row2 span[style]{margin-left:0!important;}
  .btn{border:none;background:#3f4b58;color:#dfe7ef;font-size:13px;padding:8px 14px;border-radius:8px;cursor:pointer;transition:.15s;}
  .btn:hover{background:#4a5867;}
  .btn.ratio{padding:8px 12px;}
  .btn.ratio.active,.btn.lang.active{background:#25d366;color:#0b1f12;font-weight:600;}
  .lbl{font-size:12px;color:#8ea3b8;margin-bottom:6px;}
  .toggle{display:flex;align-items:center;gap:7px;font-size:13px;color:#aebccb;cursor:pointer;user-select:none;}
  .toggle input{width:16px;height:16px;accent-color:#25d366;cursor:pointer;}

  /* ===== 휴대폰 프레임 ===== */
  .phone{
    width:390px;height:693px;background:#000;border-radius:44px;padding:11px;
    overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.55),0 0 0 2px #2c2c2c;transition:.2s;
  }
  .phone.r34{height:520px;}
  .phone.bare{background:none;border-radius:0;padding:0;box-shadow:none;}
  .phone.bare .screen{border-radius:0;}

  .screen{
    width:100%;height:100%;border-radius:34px;overflow:hidden;position:relative;
    display:flex;flex-direction:column;background:#e5ddd5;
  }
  .screen .wall{position:absolute;inset:0;z-index:0;opacity:.55;pointer-events:none;
    background-image:radial-gradient(rgba(0,0,0,.04) 1px,transparent 1px);background-size:22px 22px;}

  .statusbar{position:relative;z-index:3;height:26px;background:#008069;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 18px;font-size:12px;color:#fff;font-weight:600;}
  .statusbar .right{display:flex;align-items:center;gap:5px;}
  .statusbar .batt{width:22px;height:11px;border:1px solid #fff;border-radius:3px;position:relative;padding:1px;}
  .statusbar .batt::after{content:"";position:absolute;right:-3px;top:3px;width:2px;height:5px;background:#fff;border-radius:0 1px 1px 0;}
  .statusbar .batt i{display:block;width:80%;height:100%;background:#fff;border-radius:1px;}

  .header{position:relative;z-index:3;height:56px;background:#008069;
    display:flex;align-items:center;padding:0 10px;color:#fff;gap:8px;}
  .header .back{font-size:22px;line-height:1;}
  .header .av{width:38px;height:38px;border-radius:50%;background:#cfd8d6;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;color:#5a6b66;font-size:17px;font-weight:700;}
  .header .info{flex:1;display:flex;flex-direction:column;justify-content:center;line-height:1.2;min-width:0;}
  .header .nm{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .header .sub{font-size:12px;color:#d7e9e4;height:14px;}
  .header .hic{display:flex;align-items:center;gap:16px;padding:0 8px 0 4px;}
  .header .hic svg{display:block;}

  .chat{position:relative;z-index:1;flex:1;min-height:0;overflow-y:auto;scroll-behavior:smooth;
    padding:14px 18px 12px;display:flex;flex-direction:column;gap:9px;}
  .chat::-webkit-scrollbar{display:none;}

  .datepill{align-self:center;background:#fff;color:#54656f;font-size:12px;font-weight:500;
    padding:5px 12px;border-radius:8px;margin:2px 0 8px;box-shadow:0 1px 1px rgba(0,0,0,.08);}
  .syspill{align-self:center;max-width:85%;text-align:center;background:#fdf3c9;color:#5b6166;
    font-size:11.5px;line-height:1.4;padding:6px 12px;border-radius:8px;margin-bottom:8px;box-shadow:0 1px 1px rgba(0,0,0,.06);}

  .msg{display:flex;align-items:flex-start;gap:6px;max-width:80%;animation:pop .26s ease;margin-bottom:2px;}
  @keyframes pop{from{opacity:0;transform:translateY(6px) scale(.97);}to{opacity:1;transform:none;}}
  .msg.in{align-self:flex-start;}
  .msg.out{align-self:flex-end;}

  .av-msg{width:30px;height:30px;border-radius:50%;flex-shrink:0;margin-top:2px;
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;}
  .av-msg.hidden{visibility:hidden;}
  .sender{display:block;font-size:12.5px;font-weight:700;margin-bottom:2px;line-height:1.2;}

  .bubble{position:relative;font-size:14.5px;line-height:1.35;font-weight:400;
    padding:6px 9px 7px;border-radius:8px;color:#111b21;word-break:break-word;
    box-shadow:0 1px .5px rgba(0,0,0,.13);min-width:64px;}
  .msg.in .bubble{background:#fff;border-top-left-radius:0;}
  .msg.out .bubble{background:#d9fdd3;border-top-right-radius:0;}
  .msg.in .bubble::before{content:"";position:absolute;left:-8px;top:0;border:8px solid transparent;border-top-color:#fff;border-right:0;}
  .msg.out .bubble::before{content:"";position:absolute;right:-8px;top:0;border:8px solid transparent;border-top-color:#d9fdd3;border-left:0;}

  .bubble .txt{display:inline;}
  .bubble .bmeta{float:right;display:inline-flex;align-items:center;gap:3px;
    font-size:10.5px;color:#667781;margin:6px 0 -2px 8px;position:relative;top:3px;}
  .bubble .bmeta .ck{color:#53bdeb;font-size:12px;letter-spacing:-3px;font-weight:700;}

  .inputbar{position:relative;z-index:3;min-height:58px;background:#f0f2f5;
    display:flex;align-items:center;gap:8px;padding:8px 10px;}
  .inputbar .field{flex:1;height:42px;background:#fff;border-radius:22px;
    display:flex;align-items:center;gap:8px;padding:0 12px;color:#8696a0;font-size:14.5px;}
  .inputbar .field .ph{flex:1;}
  .inputbar .ic{color:#8696a0;display:flex;align-items:center;}
  .inputbar .mic{width:42px;height:42px;border-radius:50%;background:#008069;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;color:#fff;}
</style>
</head>

const chat   = document.getElementById("chat");
const chips  = document.getElementById("chips");
const nameE  = document.getElementById("waName");
const avE    = document.getElementById("waAv");
const subE   = document.getElementById("waSub");
const phE    = document.getElementById("waPh");
const phone  = document.getElementById("phone");
let current  = 0, token = 0, lang = "ja";
const sleep  = ms => new Promise(r=>setTimeout(r,ms));
const scrollDown = () => chat.scrollTo({top:chat.scrollHeight,behavior:"smooth"});

scenarios.forEach((s,i)=>{
  const c=document.createElement("button");
  c.className="chip"+(i===0?" active":"");
  c.textContent=s.key;
  c.onclick=()=>{ current=i; refreshChips(); play(); };
  chips.appendChild(c);
});
function refreshChips(){[...chips.children].forEach((c,i)=>c.classList.toggle("active",i===current));}

function addDate(){
  const d=document.createElement("div");d.className="datepill";d.textContent=UI[lang].date;chat.appendChild(d);
}
function addSys(){
  const d=document.createElement("div");d.className="syspill";d.textContent=UI[lang].enc;chat.appendChild(d);
}
function addBubble(m, cont){
  const s=scenarios[current], L=s[lang];
  const r=document.createElement("div");
  r.className="msg "+m.side;
  if(m.side==="in"){
    const av = `<div class="av-msg${cont?" hidden":""}" style="background:${s.color}">${L.avatar}</div>`;
    const sender = cont ? "" : `<span class="sender" style="color:${s.color}">${L.peer}</span>`;
    r.innerHTML=`${av}<div class="bubble">${sender}<span class="txt">${m[lang]}</span><span class="bmeta"><span>${m.time}</span></span></div>`;
  }else{
    r.innerHTML=`<div class="bubble"><span class="txt">${m[lang]}</span><span class="bmeta"><span>${m.time}</span><span class="ck">✓✓</span></span></div>`;
  }
  chat.appendChild(r); scrollDown(); return r;
}

async function play(){
  const t=++token;
  chat.innerHTML="";
  const s=scenarios[current], L=s[lang];
  nameE.textContent=L.title;
  avE.textContent=L.avatar;
  subE.textContent=UI[lang].online;
  phE.textContent=UI[lang].placeholder;
  addDate(); addSys();
  await sleep(500);
  for(let i=0;i<s.messages.length;i++){
    if(t!==token) return;
    const m=s.messages[i];
    const cont = m.side==="in" && i>0 && s.messages[i-1].side==="in";
    if(m.side==="in"){
      subE.textContent=UI[lang].typing;
      await sleep(1100);
      if(t!==token){subE.textContent=UI[lang].online;return;}
      subE.textContent=UI[lang].online;
      addBubble(m, cont);
    }else{
      addBubble(m, false);
    }
    await sleep(850);
  }
}

/* 언어 토글 */
document.querySelectorAll(".btn.lang").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".btn.lang").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    lang=b.dataset.lang;
    document.documentElement.lang = lang;
    play();
  });
});

  phone.classList.toggle("bare",!e.target.checked);

  b.addEventListener("click",()=>{
    document.querySelectorAll(".btn.ratio").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    phone.classList.toggle("r34", b.dataset.ratio==="34");
  });
});
document.getElementById("replay").onclick=play;

/* ===== 화면 녹화 → MP4 저장 ===== */
const recBtn=document.getElementById("recBtn");
let _rec=null,_chunks=[],_recording=false;
function _recTarget(){return document.getElementById("phone");}
function _pickMime(){
  const c=["video/mp4;codecs=avc1.42E01E,mp4a.40.2","video/mp4;codecs=avc1","video/mp4",
           "video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm"];
  for(const m of c) if(window.MediaRecorder&&MediaRecorder.isTypeSupported(m)) return m;
  return "";
}
async function _startRec(){
  if(_recording)return;
  if(!navigator.mediaDevices||!navigator.mediaDevices.getDisplayMedia){alert("이 브라우저는 화면 녹화를 지원하지 않습니다. Chrome/Edge에서 열어주세요.");return;}
  let stream;
  try{ stream=await navigator.mediaDevices.getDisplayMedia({preferCurrentTab:true,video:{frameRate:30},audio:false}); }
  catch(e){ return; }
  try{
    if(window.CropTarget&&CropTarget.fromElement){
      const ct=await CropTarget.fromElement(_recTarget());
      const vt=stream.getVideoTracks()[0];
      if(vt.cropTo) await vt.cropTo(ct);
    }
  }catch(e){}
  const mime=_pickMime();
  _chunks=[];
  try{ _rec=new MediaRecorder(stream,mime?{mimeType:mime,videoBitsPerSecond:8000000}:{}); }
  catch(e){ _rec=new MediaRecorder(stream); }
  _rec.ondataavailable=e=>{if(e.data&&e.data.size)_chunks.push(e.data);};
  _rec.onstop=()=>{
    stream.getTracks().forEach(t=>t.stop());
    const type=_rec.mimeType||mime||"video/webm";
    const ext=type.indexOf("mp4")>=0?"mp4":"webm";
    const blob=new Blob(_chunks,{type});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download="whatsapp-demo-"+Date.now()+"."+ext; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
    _recording=false; recBtn.textContent="🔴 MP4 녹화"; recBtn.style.background="#c0392b";
  };
  stream.getVideoTracks()[0].addEventListener("ended",()=>{ if(_recording)_rec.stop(); });
  _recording=true; recBtn.textContent="⏹ 녹화 중지 / 저장"; recBtn.style.background="#7f1d1d";
  _rec.start();
  await play();
  await sleep(700);
  if(_recording)_rec.stop();
}
recBtn.onclick=()=>{ _recording? _rec.stop() : _startRec(); };

play();
</script>
