<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE風 メッセンジャー デモ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  body{
    font-family:"Noto Sans JP",sans-serif;
    background:#202730;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:24px;
    padding:32px 16px 40px;
  }

  /* ===== 조작 패널 (운영자용 · 한국어 · 녹화 시 크롭) ===== */
  .controls{
    width:280px;
    flex-shrink:0;
    position:fixed;
    left:20px;
    top:32px;
    background:#2b333d;
    border:1px solid #3b4654;
    border-radius:14px;
    padding:14px 16px;
    color:#cdd6e0;
  }
  .row2{gap:8px;}
  .row2 span[style]{margin-left:0!important;}
  .controls h2{font-size:13px;font-weight:600;color:#8ea3b8;margin-bottom:10px;letter-spacing:.02em;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
  .chip{
    border:1px solid #45525f;background:#333d49;color:#c7d2dd;
    font-size:13px;padding:7px 13px;border-radius:999px;cursor:pointer;
    transition:.15s;white-space:nowrap;
  }
  .chip:hover{background:#3d4956;}
  .chip.active{background:#06c755;border-color:#06c755;color:#fff;font-weight:600;}
  .row2{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .btn{
    border:none;background:#3f4b58;color:#dfe7ef;font-size:13px;
    padding:8px 14px;border-radius:8px;cursor:pointer;transition:.15s;
  }
  .btn:hover{background:#4a5867;}
  .btn.ratio{padding:8px 12px;}
  .btn.ratio.active{background:#06c755;color:#fff;font-weight:600;}
  .toggle{display:flex;align-items:center;gap:7px;font-size:13px;color:#aebccb;cursor:pointer;user-select:none;}
  .toggle input{width:16px;height:16px;accent-color:#06c755;cursor:pointer;}

  /* ===== 휴대폰 프레임 ===== */
  .phone{
    width:390px;
    height:693px;          /* 9:16 (390 × 16/9) */
    background:#000;
    border-radius:44px;
    padding:11px;
    overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.55), 0 0 0 2px #2c2c2c;
    transition:.2s;
  }
  /* 비율 3:4 (390 × 4/3) */
  .phone.r34{height:520px;}
  /* 목업 OFF: 깔끔한 사각형 화면만 */
  .phone.bare{
    background:none;border-radius:0;padding:0;box-shadow:none;
  }
  .phone.bare .screen{border-radius:0;}

  .screen{
    width:100%;height:100%;
    border-radius:34px;
    overflow:hidden;
    position:relative;
    display:flex;flex-direction:column;
    background:linear-gradient(180deg,#7fb9e0 0%,#9ccbe8 38%,#bcdcf0 100%);
  }
  .screen::before{
    content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(120px 50px at 18% 30%,rgba(255,255,255,.55),transparent 70%),
      radial-gradient(160px 60px at 80% 18%,rgba(255,255,255,.45),transparent 70%),
      radial-gradient(140px 55px at 60% 62%,rgba(255,255,255,.30),transparent 70%),
      radial-gradient(180px 70px at 25% 85%,rgba(255,255,255,.35),transparent 70%);
  }

  /* 상태바 */
  .statusbar{
    position:relative;z-index:2;
    height:26px;display:flex;align-items:center;justify-content:space-between;
    padding:0 18px;font-size:12px;color:#1d2730;font-weight:600;
  }
  .statusbar .right{display:flex;align-items:center;gap:5px;}
  .statusbar .batt{width:22px;height:11px;border:1px solid #1d2730;border-radius:3px;position:relative;padding:1px;}
  .statusbar .batt::after{content:"";position:absolute;right:-3px;top:3px;width:2px;height:5px;background:#1d2730;border-radius:0 1px 1px 0;}
  .statusbar .batt i{display:block;width:80%;height:100%;background:#1d2730;border-radius:1px;}

  /* 헤더 */
  .header{
    position:relative;z-index:2;
    height:48px;background:#3a4654;
    display:flex;align-items:center;padding:0 12px;color:#fff;gap:6px;
  }
  .header .back{font-size:20px;line-height:1;}
  .header .cnt{font-size:14px;color:#cfd6dd;margin-right:2px;}
  .header .title{flex:1;display:flex;align-items:center;gap:6px;font-size:16px;font-weight:600;}
  .header .shield{
    width:18px;height:20px;background:#3aaa35;
    display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;
    clip-path:polygon(0 0,100% 0,100% 70%,50% 100%,0 70%);
  }
  .header .ic{font-size:18px;opacity:.95;padding:0 4px;display:flex;align-items:center;}

  /* 채팅 영역 */
  .chat{
    position:relative;z-index:1;flex:1;min-height:0;overflow-y:auto;scroll-behavior:smooth;
    padding:14px 12px 6px;display:flex;flex-direction:column;gap:10px;
  }
  .chat::-webkit-scrollbar{display:none;}

  .datepill{align-self:center;background:rgba(90,105,120,.72);color:#fff;font-size:12px;
    padding:4px 14px;border-radius:999px;margin:2px 0 6px;}

  .msg{display:flex;align-items:flex-start;gap:7px;max-width:88%;animation:pop .28s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.96);}to{opacity:1;transform:none;}}
  .msg.in{align-self:flex-start;}
  .msg.out{align-self:flex-end;flex-direction:row-reverse;}

  .avatar{width:38px;height:38px;border-radius:50%;background:#7c5fd6;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:700;
    box-shadow:inset 0 -6px 10px rgba(0,0,0,.12);}

  .bubble{position:relative;font-size:15px;line-height:1.3;font-weight:500;padding:8px 13px;border-radius:16px;
    color:#14202b;word-break:break-word;max-width:230px;}
  .msg.in .bubble{background:#fff;border-top-left-radius:5px;}
  .msg.out .bubble{background:#7ec74d;border-top-right-radius:5px;}
  .msg.in .bubble::before{content:"";position:absolute;left:-5px;top:0;border:6px solid transparent;border-top-color:#fff;border-right:0;}
  .msg.out .bubble::before{content:"";position:absolute;right:-5px;top:0;border:6px solid transparent;border-top-color:#7ec74d;border-left:0;}

  .meta{display:flex;flex-direction:column;justify-content:flex-end;align-self:flex-end;font-size:10.5px;color:#33424f;line-height:1.4;}
  .msg.out .meta{align-items:flex-end;text-align:right;}
  .msg.in .meta{align-items:flex-start;}
  .meta .read{color:#3a4a57;font-weight:600;}

  .typing .bubble{background:#fff;display:flex;gap:4px;padding:12px 14px;}
  .typing .dot{width:7px;height:7px;border-radius:50%;background:#b8c2cc;animation:blink 1.2s infinite;}
  .typing .dot:nth-child(2){animation-delay:.2s;}
  .typing .dot:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,60%,100%{opacity:.3;}30%{opacity:1;}}

  .inputbar{position:relative;z-index:2;height:54px;background:#f3f4f6;
    display:flex;align-items:center;gap:9px;padding:0 12px;}
  .inputbar .pic{font-size:22px;color:#7c8894;}
  .inputbar .field{flex:1;height:34px;background:#fff;border-radius:18px;border:1px solid #e2e5e9;}
  .inputbar .send{background:#4a8fd6;color:#fff;font-size:13px;font-weight:600;
    padding:8px 14px;border-radius:8px;}
</style>
</head>
<body>

  <div class="controls">
    <h2>직무/산업 선택 — 클릭하면 해당 예시 채팅이 처음부터 재생됩니다 (약 25~30초)</h2>
    <div class="chips" id="chips"></div>

    </div>
  </div>

  <div class="phone" id="phone">
    <div class="screen">
      <div class="statusbar">

      <div class="inputbar">
        <span class="pic">＋</span><span class="pic">☺</span>
        <span class="field"></span>
        <span class="send">送信</span>

const chat   = document.getElementById("chat");
const chips  = document.getElementById("chips");
const titleE = document.getElementById("chatTitle");
const cntE   = document.getElementById("hCnt");
const phone  = document.getElementById("phone");
let current  = 0;
let token    = 0;
const sleep  = ms => new Promise(r=>setTimeout(r,ms));
const scrollDown = () => chat.scrollTo({top:chat.scrollHeight,behavior:"smooth"});

/* 칩 생성 */
scenarios.forEach((s,i)=>{
  const c=document.createElement("button");
  c.className="chip"+(i===0?" active":"");
  c.textContent=s.key;
  c.onclick=()=>{ current=i; refreshChips(); play(); };
  chips.appendChild(c);
});
function refreshChips(){
  [...chips.children].forEach((c,i)=>c.classList.toggle("active",i===current));
}

function addDate(){
  const d=document.createElement("div");
  d.className="datepill"; d.textContent="今日";
  chat.appendChild(d);
}
function addTyping(){
  const r=document.createElement("div");
  r.className="msg in typing";
  r.innerHTML=`<div class="avatar">${scenarios[current].avatar}</div>
    <div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  chat.appendChild(r); scrollDown(); return r;
}
function addBubble(m){
  const r=document.createElement("div");
  r.className="msg "+m.side;
  const av = m.side==="in" ? `<div class="avatar">${scenarios[current].avatar}</div>` : "";
  const meta = m.side==="out"
      ? `<div class="meta"><span class="read">既読</span><span>${m.time}</span></div>`
      : `<div class="meta"><span>${m.time}</span></div>`;
  r.innerHTML = `${av}<div class="bubble">${m.text}</div>${meta}`;
  chat.appendChild(r); scrollDown(); return r;
}

async function play(){
  const t=++token;
  chat.innerHTML="";
  const s=scenarios[current];
  titleE.textContent=s.title;
  cntE.textContent=s.members;
  addDate();
  await sleep(500);
  for(const m of s.messages){
    if(t!==token) return;
    if(m.side==="in"){
      const ty=addTyping();
      await sleep(1100);
      if(t!==token){ty.remove();return;}
      ty.remove();
      addBubble(m);
    }else{
      addBubble(m);
    }
    await sleep(850);
  }
}

  phone.classList.toggle("bare",!e.target.checked);
});

/* 비율 토글 (9:16 / 3:4) */
document.querySelectorAll(".btn.ratio").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".btn.ratio").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    phone.classList.toggle("r34", b.dataset.ratio==="34");
  });
});
document.getElementById("replay").onclick=play;

/* ===== 화면 녹화 → MP4 저장 ===== */
const recBtn=document.getElementById("recBtn");
let _rec=null,_chunks=[],_recording=false;
function _recTarget(){return document.getElementById("phone");}
function _pickMime(){
  const c=["video/mp4;codecs=avc1.42E01E,mp4a.40.2","video/mp4;codecs=avc1","video/mp4",
           "video/webm;codecs=vp9","video/webm;codecs=vp8","video/webm"];
  for(const m of c) if(window.MediaRecorder&&MediaRecorder.isTypeSupported(m)) return m;
  return "";
}
async function _startRec(){
  if(_recording)return;
  if(!navigator.mediaDevices||!navigator.mediaDevices.getDisplayMedia){alert("이 브라우저는 화면 녹화를 지원하지 않습니다. Chrome/Edge에서 열어주세요.");return;}
  let stream;
  try{ stream=await navigator.mediaDevices.getDisplayMedia({preferCurrentTab:true,video:{frameRate:30},audio:false}); }
  catch(e){ return; }
  try{
    if(window.CropTarget&&CropTarget.fromElement){
      const ct=await CropTarget.fromElement(_recTarget());
      const vt=stream.getVideoTracks()[0];
      if(vt.cropTo) await vt.cropTo(ct);
    }
  }catch(e){}
  const mime=_pickMime();
  _chunks=[];
  try{ _rec=new MediaRecorder(stream,mime?{mimeType:mime,videoBitsPerSecond:8000000}:{}); }
  catch(e){ _rec=new MediaRecorder(stream); }
  _rec.ondataavailable=e=>{if(e.data&&e.data.size)_chunks.push(e.data);};
  _rec.onstop=()=>{
    stream.getTracks().forEach(t=>t.stop());
    const type=_rec.mimeType||mime||"video/webm";
    const ext=type.indexOf("mp4")>=0?"mp4":"webm";
    const blob=new Blob(_chunks,{type});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download="line-demo-"+Date.now()+"."+ext; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
    _recording=false; recBtn.textContent="🔴 MP4 녹화"; recBtn.style.background="#c0392b";
  };
  stream.getVideoTracks()[0].addEventListener("ended",()=>{ if(_recording)_rec.stop(); });
  _recording=true; recBtn.textContent="⏹ 녹화 중지 / 저장"; recBtn.style.background="#7f1d1d";
  _rec.start();
  await play();
  await sleep(700);
  if(_recording)_rec.stop();
}
recBtn.onclick=()=>{ _recording? _rec.stop() : _startRec(); };

play();
